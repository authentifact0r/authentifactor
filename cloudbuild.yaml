# Builds the Authentifactor image and deploys it to Cloud Run.
#
# NEXT_PUBLIC_* values are inlined at build time from the committed
# .env.production (browser-exposed publishable values only). Runtime
# secrets (DATABASE_URL, PAYSTACK_*, STRIPE_SECRET_KEY, ...) are bound
# on the Cloud Run service and are intentionally NOT set here.
#
# Invoked by .github/workflows/deploy.yml on push to main, or manually:
#   gcloud builds submit --config cloudbuild.yaml --project hybrid-saas-platform

substitutions:
  _REGION: europe-west1
  _SERVICE: authentifactor
  _IMAGE: europe-west1-docker.pkg.dev/hybrid-saas-platform/cloud-run-source-deploy/authentifactor
  # Browser-exposed public values (the Stripe key is the *publishable* pk_live,
  # public by design). Runtime secrets stay in Secret Manager on the service.
  _APP_URL: "https://authentifactor.com"
  _STRIPE_PK: "pk_live_51S7Hts0UXmT8UaSaFEi50aKkqdvaJN5YubNlQJZg9SqxLocrw8O0IkeBCtWHJ1G2BhXd70ksVWm1rBqsgVA0qihA00zZ9muxv9"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_APP_URL=${_APP_URL}
      - --build-arg
      - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${_STRIPE_PK}
      - -t
      - ${_IMAGE}:${SHORT_SHA}
      - -t
      - ${_IMAGE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_IMAGE}"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --quiet

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest
